<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="免费在线Word转PDF工具，将.docx文档转换为PDF格式，完全在浏览器本地处理，保护隐私。">
  <title>Word 转 PDF — B help U</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    .print-guide {
      background: rgba(79, 70, 229, 0.06);
      border: 1px solid rgba(79, 70, 229, 0.15);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      margin-top: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .print-guide-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .print-guide code {
      background: rgba(79, 70, 229, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: 600;
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <div class="bg-decoration"></div>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="/" class="logo">
        <div class="logo-icon">B</div>
        B help U
      </a>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="切换暗色模式" title="切换暗色/亮色模式">
          <span class="theme-icon-dark">🌙</span>
          <span class="theme-icon-light" style="display:none">☀️</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="tool-page">
    <div class="container">
      <a href="/" class="back-link">← 返回首页</a>

      <div class="tool-header">
        <h1>Word 转 <span class="gradient-text">PDF</span></h1>
        <p>上传 .docx 文档，通过浏览器原生打印引擎转为 PDF，排版与 Word 一致。所有处理在本地完成，文件不上传。</p>
      </div>

      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <h3>拖拽 Word 文档到此处</h3>
        <p>或点击选择文件</p>
        <span class="upload-hint">支持 .docx 格式，最大 20MB</span>
        <input type="file" id="fileInput" accept=".docx" hidden>
      </div>

      <div id="workspace" style="display:none">
        <div class="tool-header" style="margin-bottom:24px">
          <p id="fileName" style="font-weight:500;color:var(--color-text)"></p>
        </div>

        <div class="tool-workspace">
          <div class="preview-panel" style="grid-column:1/-1">
            <div class="preview-panel-header">
              <h3>文档预览</h3>
              <span class="preview-count" id="pageEstimate">—</span>
            </div>
            <div class="preview-content" style="padding:32px;min-height:400px;display:block;overflow-y:auto;max-height:600px">
              <div id="docPreview" class="doc-preview" style="color:var(--color-text);line-height:1.8;font-size:14px"></div>
            </div>
          </div>

          <div class="settings-panel">
            <h3>PDF 设置</h3>

            <div class="setting-group">
              <label>纸张大小</label>
              <select id="pageSize">
                <option value="a4" selected>A4</option>
                <option value="letter">Letter</option>
              </select>
            </div>

            <div class="setting-group">
              <label>纸张方向</label>
              <div class="radio-group" id="orientationGroup">
                <button class="active" data-value="portrait">纵向</button>
                <button data-value="landscape">横向</button>
              </div>
            </div>

            <div class="setting-group">
              <label>页边距</label>
              <select id="marginSize">
                <option value="15">标准 (15mm)</option>
                <option value="10">小 (10mm)</option>
                <option value="20">大 (20mm)</option>
              </select>
            </div>

            <div class="setting-group">
              <label>正文字号</label>
              <select id="fontScale">
                <option value="12">12px</option>
                <option value="13">13px</option>
                <option value="14" selected>14px</option>
                <option value="16">16px</option>
              </select>
            </div>

            <button class="btn btn-primary convert-btn" id="convertBtn">
              转换为 PDF
            </button>

            <button class="btn btn-glass convert-btn" id="reuploadBtn" style="margin-top:8px">
              重新上传
            </button>

            <div class="print-guide" style="display:none" id="printGuide">
              <span class="print-guide-icon">💡</span>
              <div>
                <strong>提示</strong><br>
                在弹出的打印对话框中选择目标为 <code>另存为 PDF</code> 或 <code>Save as PDF</code>，即可保存 PDF 文件到本地。
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/main.js"></script>
  <script>
  (function() {
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const workspace = document.getElementById('workspace');
    const fileName = document.getElementById('fileName');
    const docPreview = document.getElementById('docPreview');
    const pageEstimate = document.getElementById('pageEstimate');
    const convertBtn = document.getElementById('convertBtn');
    const reuploadBtn = document.getElementById('reuploadBtn');
    const printGuide = document.getElementById('printGuide');
    const toast = document.getElementById('toast');

    let docxBuffer = null;

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('drag-over');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('drag-over');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });

    async function handleFile(file) {
      if (!file) return;
      if (!file.name.endsWith('.docx')) {
        showToast('仅支持 .docx 格式');
        return;
      }
      if (file.size > 20 * 1024 * 1024) {
        showToast('文件超过 20MB 限制');
        return;
      }

      fileName.textContent = file.name;
      docPreview.innerHTML = '';

      const reader = new FileReader();
      reader.onload = async (e) => {
        docxBuffer = e.target.result;
        try {
          const result = await mammoth.convertToHtml({
            arrayBuffer: docxBuffer,
            styleMap: [
              "p[style-name='Heading 1'] => h1:fresh",
              "p[style-name='Heading 2'] => h2:fresh",
              "p[style-name='Heading 3'] => h3:fresh",
              "r[style-name='Strong'] => strong",
              "r[style-name='Emphasis'] => em"
            ]
          });

          // Wrap in a container for proper styling
          const html = result.value
            // Fix mammoth's inline style for better print rendering
            .replace(/style="text-align:/g, 'style="text-align:')
            .replace(/<p>/g, '<p style="margin:0.3em 0;">')
            .replace(/<p style="margin:0\.3em 0;" style="text-align:/g, '<p style="text-align:');

          docPreview.innerHTML = html;

          workspace.style.display = 'block';
          uploadArea.style.display = 'none';
          printGuide.style.display = 'none';
          estimatePages();

          if (result.messages.length) console.warn('Mammoth messages:', result.messages);
        } catch (err) {
          console.error(err);
          showToast('文档解析失败，请检查文件格式');
        }
      };
      reader.readAsArrayBuffer(file);
      fileInput.value = '';
    }

    function estimatePages() {
      const text = docPreview.textContent || '';
      const fontSize = parseInt(document.getElementById('fontScale').value);
      const charsPerLine = 80;
      const linesPerPage = 50;
      const charsPerPage = charsPerLine * linesPerPage * (14 / fontSize);
      const pages = Math.max(1, Math.ceil(text.length / charsPerPage));
      pageEstimate.textContent = `约 ${pages} 页`;
    }

    reuploadBtn.addEventListener('click', () => {
      docxBuffer = null;
      docPreview.innerHTML = '';
      workspace.style.display = 'none';
      uploadArea.style.display = '';
      printGuide.style.display = 'none';
    });

    document.getElementById('orientationGroup').addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        document.querySelectorAll('#orientationGroup button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
      }
    });

    document.getElementById('fontScale').addEventListener('change', estimatePages);

    convertBtn.addEventListener('click', () => {
      if (!docxBuffer) {
        showToast('请先上传文档');
        return;
      }

      const orientation = document.querySelector('#orientationGroup .active').dataset.value;
      const pageSize = document.getElementById('pageSize').value;
      const margin = document.getElementById('marginSize').value;
      const fontSize = parseInt(document.getElementById('fontScale').value);

      const sizeMap = { a4: '210mm 297mm', letter: '215.9mm 279.4mm' };
      const paper = sizeMap[pageSize] || sizeMap.a4;

      // Build a self-contained print document
      const printDoc = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${escapeHtml(fileName.textContent)}</title>
<style>
  @page {
    size: ${paper} ${orientation};
    margin: 0;
  }
  body {
    font-family: 'Inter', 'Segoe UI', 'SimSun', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    font-size: ${fontSize}px;
    line-height: 1.75;
    color: #0F172A;
    padding: ${margin}mm;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  h1 { font-size: 1.8em; margin: 0.6em 0 0.35em; line-height: 1.25; page-break-after: avoid; }
  h2 { font-size: 1.4em; margin: 0.55em 0 0.3em; line-height: 1.3; page-break-after: avoid; }
  h3 { font-size: 1.15em; margin: 0.45em 0 0.25em; page-break-after: avoid; }
  p { margin: 0.35em 0; orphans: 3; widows: 3; }
  ul, ol { margin: 0.35em 0; padding-left: 1.8em; }
  li { margin: 0.15em 0; }
  table { border-collapse: collapse; width: 100%; margin: 0.6em 0; page-break-inside: avoid; }
  table td, table th { border: 1px solid #ccc; padding: 5px 10px; font-size: 0.9em; }
  img { max-width: 100%; height: auto; }
  blockquote { border-left: 3px solid #4F46E5; padding-left: 1em; margin: 0.5em 0; color: #475569; }
  /* Avoid page breaks in the middle of content */
  h1, h2, h3, h4 { page-break-after: avoid; }
  tr, li { page-break-inside: avoid; }
</style>
</head>
<body>
${docPreview.innerHTML}
<script>
  // Auto-trigger print after fonts load
  document.fonts.ready.then(() => {
    window.print();
    // Close window after print dialog is done
    window.addEventListener('afterprint', () => window.close());
  });
<\/script>
</body>
</html>`;

      const blob = new Blob([printDoc], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const w = window.open(url, '_blank', 'width=800,height=600');
      if (!w) {
        showToast('请允许弹窗以生成 PDF');
        URL.revokeObjectURL(url);
        return;
      }

      // Show guide after a short delay (print dialog may block)
      printGuide.style.display = 'block';
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  })();
  </script>
</body>
</html>
